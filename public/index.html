<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathKnights</title>
    <link rel="stylesheet" href="./style.css">
</head>
<header>
    <nav style="padding: 1rem;">
        <div class="spaceBetweenContainer">
            <p style="font-family: korn;">MathKnights Aftermatch</p>
            <div id="startBtnContainer">
                <div>
                    <button id="startBtn" style="padding: 1rem; width: 10rem; background-color: black; color: white; font-size: 32px; font-family: korn; border-radius: 12px;">Começar</button>
                </div>
            </div>
            <p>Sothnik was here</p>
        </div>
    </nav>
</header>
<body>
    <div id="gameContainer">
        <div class="spaceAroundContainer" style="padding: 20px;">
            <div>
                <p>Vida</p>
                <progress id="player1Health" max="100" value="100"></progress>
                <p>playerName</p>
            </div>
            <div>
                <div>
                    <p id="nowTime" style="padding: 2rem;">10</p>
                </div>
            </div>
            <div>
                <p class="flexEndP">Vida</p>
                <progress id="player2Health" max="100" value="100"></progress>
                <p class="flexEndP">playerName</p>
            </div>
        </div>
    <main class="spaceAroundContainer" style="padding: 4rem;">
        <div>
            <img class="player" src="" alt="">
        </div>
            <div>
                <div style="height: 200px; width: 250px; background-color: rgba(17, 17, 17, 0.719); border-radius: 12px; border: solid 1px black;">
                    <div class="spaceAroundContainer" style="height: 150px;">
                        <p id="val1">x</p>
                        <p>X</p>
                        <p id="val2">x</p>
                    </div>
                    <div class="flexCenter">
                        <input style="width: 25px; height: 25px; background-color: black; color: white; border: solid 1px white; padding: 4px;" type="text" name="" id="answare">
                        <input style="background-color: black; color: white; border: solid 1px white; padding: 4px;" type="submit" value="Confirmar" id="confirmBtn">
                    </div>
                </div>
            </div>
            <div>
                <img style="transform: scaleX(-1);" class="player" src="" alt="">
            </div>
        </div>
    </main>
</body>
<script type="module" src="/src/script.js"></script>
</html>
