<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character selection</title>
    <link rel="stylesheet" href="chrSelection.css">
</head>
<header>
    <nav>
        <div class="spaceBetween" style="background-color: rgba(0, 0, 0, 0.500); padding: 2rem;">
            <p style="font-family: korn;">MathKnights Aftermatch</p>
            <p>Sothnik was here</p>
        </div>
    </nav>
</header>
<body>
    <main class="spaceAroundContainer">
        <div>
            <div class="flexCenter" style="padding: 2rem;">
                <button class="changeBtn"><</button>
                <p style="padding: 12px;">Selecione</p>
                <button class="changeBtn">></button>
            </div>
            <div>
                <img class="player" src="" alt="">
            </div>
        </div>
        <div>
            <div class="flexCenter" style="padding: 2rem;">
                <button class="changeBtn"><</button>
                <p style="padding: 12px;">Selecione</p>
                <button class="changeBtn">></button>
            </div>
            <div>
                <img style="transform: scaleX(-1);" class="player" src="" alt="">
            </div>
        </div>
    </main>
    <footer>
        <div>
            <div class="flexCenter" style="padding: 3rem;">
                <button id="startBtn" style="padding: 1rem;">Começar</button>
            </div>
        </div>
    </footer>
</body>
<script src="chrSelection.js"></script>
</html>
